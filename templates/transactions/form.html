{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">{% if tx %}編輯紀錄{% else %}新增紀錄{% endif %}</h4>
            </div>
            <div class="card-body">
                <form action="{% if tx %}{{ url_for('transactions.update', id=tx.id) }}{% else %}{{ url_for('transactions.create') }}{% endif %}" method="POST">
                    <div class="mb-3">
                        <label for="amount" class="form-label">金額</label>
                        <input type="number" step="0.01" class="form-control" id="amount" name="amount" value="{{ tx.amount if tx else '' }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="category_id" class="form-label">分類</label>
                        <select class="form-select" id="category_id" name="category_id" required>
                            <option value="">請選擇分類...</option>
                            <optgroup label="收入">
                                {% for c in categories if c.type == 'income' %}
                                <option value="{{ c.id }}" {% if tx and tx.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                            </optgroup>
                            <optgroup label="支出">
                                {% for c in categories if c.type == 'expense' %}
                                <option value="{{ c.id }}" {% if tx and tx.category_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                                {% endfor %}
                            </optgroup>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="date" class="form-label">日期</label>
                        <input type="date" class="form-control" id="date" name="date" value="{{ tx.date if tx else today }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="note" class="form-label">備註 (選填)</label>
                        <textarea class="form-control" id="note" name="note" rows="3">{{ tx.note if tx else '' }}</textarea>
                    </div>
                    
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                        <a href="{{ url_for('dashboard.index') }}" class="btn btn-secondary me-md-2">取消</a>
                        <button type="submit" class="btn btn-primary">儲存</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
