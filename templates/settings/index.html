{% extends 'base.html' %}

{% block content %}
<div class="row">
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">全域設定</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('settings.update') }}" method="POST">
                    <div class="mb-3">
                        <label for="month_start_day" class="form-label">自訂月起始日 (1-28)</label>
                        <input type="number" class="form-control" id="month_start_day" name="month_start_day" value="{{ month_start_day }}" min="1" max="28" required>
                        <div class="form-text">設定每個月的結算起點，例如設定 5 號，則本期為 5 號到下個月 4 號。</div>
                    </div>
                    <button type="submit" class="btn btn-primary">更新設定</button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-6 mb-4">
        <div class="card shadow-sm h-100">
            <div class="card-header bg-secondary text-white">
                <h5 class="mb-0">收支分類管理</h5>
            </div>
            <div class="card-body">
                <form action="{{ url_for('settings.create_category') }}" method="POST" class="mb-4">
                    <div class="row g-2">
                        <div class="col-md-5">
                            <input type="text" class="form-control" name="name" placeholder="新分類名稱" required>
                        </div>
                        <div class="col-md-4">
                            <select class="form-select" name="type" required>
                                <option value="expense">支出</option>
                                <option value="income">收入</option>
                            </select>
                        </div>
                        <div class="col-md-3 d-grid">
                            <button type="submit" class="btn btn-success">新增</button>
                        </div>
                    </div>
                </form>
                
                <ul class="list-group">
                    {% for c in categories %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <div>
                            <span class="badge {% if c.type == 'income' %}bg-success{% else %}bg-danger{% endif %} me-2">
                                {{ '收入' if c.type == 'income' else '支出' }}
                            </span>
                            {{ c.name }}
                        </div>
                        {% if not c.is_default %}
                        <form action="{{ url_for('settings.delete_category', id=c.id) }}" method="POST" class="m-0">
                            <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('確定刪除分類？')">刪除</button>
                        </form>
                        {% else %}
                        <span class="badge bg-secondary">系統預設</span>
                        {% endif %}
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </div>
</div>
{% endblock %}
